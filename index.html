<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hijri Calendar</title>
    <style>
        :root {
            --bg: #f5f5f5;
            --surface: #ffffff;
            --text: #263238;
            --muted: #7f8c8d;
            --primary: rgb(126,255,116); /* green */
            --secondary: rgb(253,227,0); /* yellow */
            --error: #FC7878;
            --card-bg: #ffffff;
            --card-text: #2c3e50;
        }

        .dark {
            --bg: #0b0b0b;
            --surface: #000000;
            --text: #ffffff;
            --muted: #b0b6b8;
            --primary: rgb(126,255,116);
            --secondary: rgb(253,227,0);
            --error: #FC7878;
            --card-bg: #121212;
            --card-text: #ffffff;
        }

        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background-color: var(--bg);
            color: var(--text);
        }
        .calendar {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
            text-align: center;
            color: var(--card-text);
        }
        .controls { display:flex; justify-content:flex-end; gap:8px; align-items:center; }
        .theme-toggle {
            background: transparent;
            border: 1px solid rgba(0,0,0,0.06);
            padding:6px 8px;
            border-radius:8px;
            cursor:pointer;
            color:var(--card-text);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width:40px;
            height:36px;
        }
        .theme-toggle #theme-icon { display:inline-flex; font-size:18px; line-height:1; }
        .hijri-date {
            font-size: 2em;
            color: var(--card-text);
            margin: 14px 0;
        }
        .gregorian-date {
            font-size: 1.05em;
            color: var(--muted);
        }
        .loading { display: none; }
        .error { color: var(--error); display: none; }

        /* Month view styles */
        .month { margin-top: 18px; text-align: left; }
        .month h2 { margin: 0 0 8px 0; font-size: 1.05em; color: var(--card-text); }
        .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 10px; }
        .weekday-row { display: contents; }
        .weekday { font-size: 0.78em; color: var(--muted); text-align: center; padding: 6px 4px; }
        .day { background: rgba(255,255,255,0.03); padding: 10px 6px; border-radius: 8px; text-align: center; font-size: 0.95em; border: 1px solid rgba(0,0,0,0.04); }
        .hijri-day { font-weight: 700; font-size: 1.05em; color: var(--card-text); }
        .gregorian { font-size: 0.82em; color: var(--muted); margin-top: 4px; }
        .day.today { background: var(--primary); color: #022; box-shadow: 0 6px 14px rgba(0,0,0,0.12); transform: translateY(-2px); }
        .day.today .hijri-day { color: rgba(0,0,0,0.9); font-weight:800; }
        .day.today .gregorian { color: rgba(0,0,0,0.85); font-weight:700; font-size:0.9em; }

        @media (max-width: 720px) { .month-grid { grid-template-columns: repeat(4, 1fr); } }
        @media (max-width: 420px) { .month-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body>
    <div class="calendar">
        <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;">
            <h1 style="margin:0">Hijri Calendar</h1>
            <div class="controls">
                <button id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="Toggle theme">
                    <span id="theme-icon" aria-hidden="true">🌙</span>
                </button>
            </div>
        </div>
        <div id="loading" class="loading">Loading...</div>
        <div id="error" class="error">Error loading date</div>
        <div id="hijri-date" class="hijri-date"></div>
        <div id="gregorian-date" class="gregorian-date"></div>

        <!-- Month view -->
        <div id="month" class="month">
            <h2 id="month-title"></h2>
            <div id="month-grid" class="month-grid" aria-live="polite"></div>
        </div>
    </div>

    <!-- Simple last-updated shown outside the card -->
    <p id="last-updated-simple" style="text-align:center;margin-top:12px;color:var(--muted);font-size:0.95em;">Last updated: <span id="last-updated"></span></p>

    <script>
        // ── Hijri month sequence (ACJU transliterations) ──────────────────────
        const HIJRI_NEXT = {
            "Muharram":          "Safar",
            "Safar":             "Rabi'ul Awwal",
            "Rabi'ul Awwal":     "Rabi'uth-Thani",
            "Rabi'uth-Thani":    "Jumaadal Oola",
            "Jumaadal Oola":     "Jumaadal Aakhirah",
            "Jumaadal Aakhirah": "Rajab",
            "Rajab":             "Sha'baan",
            "Sha'baan":          "Ramadaan",
            "Ramadaan":          "Shawwaal",
            "Shawwaal":          "Dhu al-Qi'dah",
            "Dhu al-Qi'dah":     "Dhul Hijjah",
            "Dhul Hijjah":       "Muharram"
        };
        const LAST_MONTH = "Dhul Hijjah"; // rolls year over after this

        function getSLNow() {
            return new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Colombo' }));
        }

        // Fetch today's Maghrib time for Colombo from aladhan.com
        async function getMaghribSL() {
            try {
                const res = await fetch(
                    'https://api.aladhan.com/v1/timingsByCity?city=Colombo&country=Sri+Lanka&method=1',
                    { cache: 'force-cache' }
                );
                const json = await res.json();
                return json.data?.timings?.Maghrib || '18:10';
            } catch (e) {
                console.warn('Could not fetch Maghrib time, using fallback 18:10');
                return '18:10';
            }
        }

        function isPastMaghrib(maghribStr) {
            const [h, m] = maghribStr.split(':').map(Number);
            const sl = getSLNow();
            return (sl.getHours() * 60 + sl.getMinutes()) >= (h * 60 + m);
        }

        async function fetchJSON(bustCache = false) {
            const url = bustCache
                ? `./api/hijri-month.json?v=${Date.now()}`
                : './api/hijri-month.json';
            const res = await fetch(url);
            if (!res.ok) throw new Error('Failed to fetch');
            return res.json();
        }

        // Build a "tomorrow" gregorian string for display
        function tomorrowGregorianString() {
            const sl = getSLNow();
            const tomorrow = new Date(sl);
            tomorrow.setDate(sl.getDate() + 1);
            const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
            const months = ['January','February','March','April','May','June',
                            'July','August','September','October','November','December'];
            return `${days[tomorrow.getDay()]}, ${months[tomorrow.getMonth()]} ${tomorrow.getDate()}, ${tomorrow.getFullYear()}`;
        }

        async function loadCalendar() {
            const loading      = document.getElementById('loading');
            const errorEl      = document.getElementById('error');
            const hijriDateEl  = document.getElementById('hijri-date');
            const gregDateEl   = document.getElementById('gregorian-date');
            const lastUpdated  = document.getElementById('last-updated');
            const grid         = document.getElementById('month-grid');
            const title        = document.getElementById('month-title');

            loading.style.display = 'block';
            errorEl.style.display = 'none';

            try {
                let data = await fetchJSON();
                lastUpdated.textContent = new Date(data.fetchedAt).toLocaleString();

                // Maghrib transition applies ONLY on Hijri day 30 (confirmed 30-day month).
                // Day 29 is ambiguous — ACJU's fetch decides if it becomes day 30 or month day 1;
                // no UI sunset override is needed for day 29.
                const isDay30Last = data.currentHijriDay === 30 && data.totalDays === 30;

                // ── Maghrib transition check (day 30 only) ────────────────────
                if (isDay30Last) {
                    const maghrib = await getMaghribSL();
                    if (isPastMaghrib(maghrib)) {
                        // Try cache-busted fetch — Action may have already updated JSON
                        try {
                            const fresh = await fetchJSON(true);
                            // Accept fresh data only if it's truly the new month
                            if (fresh.hijriMonth !== data.hijriMonth || fresh.currentHijriDay === 1) {
                                data = fresh;
                                lastUpdated.textContent = new Date(data.fetchedAt).toLocaleString();
                            }
                        } catch (e) { /* keep old data */ }

                        // Still on day 30 of old month? → show transition state
                        if (data.currentHijriDay === 30) {
                            const nextMonth = HIJRI_NEXT[data.hijriMonth] || data.hijriMonth;
                            const nextYear  = data.hijriMonth === LAST_MONTH
                                ? String(parseInt(data.hijriYear) + 1)
                                : data.hijriYear;

                            hijriDateEl.textContent = `1 ${nextMonth}`;
                            gregDateEl.textContent  = tomorrowGregorianString();
                            loading.style.display   = 'none';

                            title.textContent = `${nextMonth} ${nextYear}`;
                            grid.innerHTML = `
                                <div style="grid-column:1/-1;text-align:center;padding:28px 12px;">
                                    <div style="font-size:2em;margin-bottom:8px;">🌙</div>
                                    <div style="font-weight:700;font-size:1.1em;color:var(--primary);margin-bottom:6px;">
                                        New Hijri month has begun
                                    </div>
                                    <div style="color:var(--muted);font-size:0.92em;">
                                        ${nextMonth} ${nextYear} calendar will be available shortly
                                    </div>
                                </div>`;
                            return;
                        }
                    }
                }
                // ── Normal render ─────────────────────────────────────────────

                hijriDateEl.textContent = `${data.currentHijriDay} ${data.hijriMonth}`;
                gregDateEl.textContent  = data.currentDate;
                loading.style.display   = 'none';

                title.textContent = `${data.hijriMonth} ${data.hijriYear}`;
                grid.innerHTML = '';

                const weekdays = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                const headerRow = document.createElement('div');
                headerRow.className = 'weekday-row';
                weekdays.forEach(w => {
                    const el = document.createElement('div');
                    el.className = 'weekday';
                    el.textContent = w;
                    headerRow.appendChild(el);
                });
                grid.appendChild(headerRow);

                data.dates.forEach(d => {
                    const day = document.createElement('div');
                    day.className = 'day';
                    if (d.hijriDay === data.currentHijriDay) day.classList.add('today');
                    day.title = d.gregorianDate;
                    day.innerHTML = `<div class="hijri-day">${d.hijriDay}</div><div class="gregorian">${d.gregorianMonth} ${d.gregorianDay}</div>`;
                    grid.appendChild(day);
                });

            } catch (err) {
                console.error('Error:', err);
                loading.style.display = 'none';
                errorEl.style.display = 'block';
                errorEl.textContent   = 'Error loading date. Please try again later.';
            }
        }

        // Load on page load
        loadCalendar();

        // Refresh every 30 minutes (catches Maghrib crossing without full reload)
        setInterval(loadCalendar, 30 * 60 * 1000);

        // Theme handling
        function applyTheme(name) {
            if (name === 'dark') {
                document.documentElement.classList.add('dark');
                document.getElementById('theme-toggle').setAttribute('aria-pressed', 'true');
                const icon = document.getElementById('theme-icon');
                if (icon) icon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" fill="currentColor"/></svg>';
                document.getElementById('theme-toggle').setAttribute('aria-label', 'Switch to light theme');
            } else {
                document.documentElement.classList.remove('dark');
                document.getElementById('theme-toggle').setAttribute('aria-pressed', 'false');
                const icon = document.getElementById('theme-icon');
                if (icon) icon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6.76 4.84l-1.8-1.79L3.17 4.84l1.79 1.8 1.8-1.8zM1 13h3v-2H1v2zm10 9h2v-3h-2v3zM17.24 19.16l1.8 1.79 1.79-1.79-1.79-1.8-1.8 1.8zM20 11v2h3v-2h-3zM12 4a8 8 0 100 16 8 8 0 000-16z" fill="currentColor"/></svg>';
                document.getElementById('theme-toggle').setAttribute('aria-label', 'Switch to dark theme');
            }
        }

        function initTheme() {
            const btn = document.getElementById('theme-toggle');
            const stored = localStorage.getItem('hijri-theme');
            if (stored) {
                applyTheme(stored);
            } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                applyTheme('dark');
            } else {
                applyTheme('light');
            }

            btn.addEventListener('click', () => {
                const isDark = document.documentElement.classList.contains('dark');
                const next = isDark ? 'light' : 'dark';
                applyTheme(next);
                localStorage.setItem('hijri-theme', next);
            });
        }

        initTheme();
    </script>
</body>
</html>
