name: Update Hijri Date

permissions:
  contents: write

on:
  schedule:
    # 01:00 Sri Lanka time - nightly check for month transitions
    - cron: '30 19 * * *'
    # 18:15 Sri Lanka time - Maghrib transition: new Hijri day begins at sunset
    - cron: '45 12 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Colombo  # Set the timezone for the entire job
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Check if fetch needed (pre-check)
        id: precheck
        run: |
          # Read current Hijri day from existing data and calculate today's day
          if [ -f api/hijri-month.json ]; then
            # Calculate today's Hijri day based on the dates in the file
            TODAY_HIJRI=$(node -e "
              const data = require('./api/hijri-month.json');
              const now = new Date();
              const today = new Date(now.toLocaleString('en-US', { timeZone: 'Asia/Colombo' }));
              const todayStr = \`\${['January','February','March','April','May','June','July','August','September','October','November','December'][today.getMonth()]} \${today.getDate()}, \${today.getFullYear()}\`;
              const match = data.dates.find(d => d.gregorianDate === todayStr);
              console.log(match ? match.hijriDay : 0);
            ")
            
            echo "Today's Hijri day: $TODAY_HIJRI"
            
            # Only proceed if day 29, 30, 1 (transition period) or calculation failed
            if [ "$TODAY_HIJRI" -ge 29 ] || [ "$TODAY_HIJRI" -eq 1 ] || [ "$TODAY_HIJRI" -eq 0 ]; then
              echo "should_fetch=true" >> $GITHUB_OUTPUT
              echo "✅ Transition period detected (day $TODAY_HIJRI) - will fetch"
            else
              echo "should_fetch=false" >> $GITHUB_OUTPUT
              echo "⏭️  Middle of month (day $TODAY_HIJRI) - skipping workflow"
            fi
          else
            echo "should_fetch=true" >> $GITHUB_OUTPUT
            echo "✅ No data file - will fetch initial data"
          fi

      - name: Fetch Hijri month calendar (smart schedule)
        if: steps.precheck.outputs.should_fetch == 'true'
        run: npm run fetch-month

      - name: Commit and push
        if: steps.precheck.outputs.should_fetch == 'true'
        env:
          REPO_TOKEN: ${{ secrets.REPO_TOKEN }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add api/hijri-month.json
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "Update Hijri month calendar - $(TZ=Asia/Colombo date)"

          # Pull any remote changes first, then push
          git pull --rebase origin main || true

          # Try push with the default token first (persisted credentials). If it fails and a REPO_TOKEN
          # is provided, retry using that token.
          if git push; then
            echo "Pushed with GITHUB_TOKEN"
          else
            if [ -n "$REPO_TOKEN" ]; then
              echo "Push failed with GITHUB_TOKEN, retrying with provided REPO_TOKEN"
              git remote set-url origin https://x-access-token:${REPO_TOKEN}@github.com/${{ github.repository }}.git
              git push
            else
              echo "Push failed and no REPO_TOKEN provided. See repository Actions settings and branch protection rules." >&2
              exit 1
            fi
          fi